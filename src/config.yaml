site:
  name: Charis Systems
  site: 'https://charis.systems'
  base: '/'
  trailingSlash: false

# Default SEO metadata
metadata:
  title:
    default: Charis Systems
    template: '%s — Charis Systems'
  description: "Expert Tech Solutions on Demand - Web design, development, ERP implementation, and consulting with predictable monthly pricing."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Charis Systems
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@charissystems'
    site: '@charissystems'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'
